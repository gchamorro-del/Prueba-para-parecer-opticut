<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador de Ventanas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .form-container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Cotizador de Ventanas</h2>
    <form id="cotizadorForm">
        <label for="descripcion">Descripción:</label>
        <input type="text" id="descripcion" name="descripcion" required>

        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" name="cantidad" required>

        <label for="precio">Precio Total (por unidad):</label>
        <input type="number" id="precio" name="precio" required>

        <button type="submit">Generar Cotización</button>
    </form>
</div>

<script src="https://apis.google.com/js/api.js"></script>
<script>
    // Aquí se puede agregar la lógica de conexión con Google Sheets y la API para guardar los datos
    function initClient() {
        gapi.client.init({
            apiKey: 'TU_API_KEY', // Aquí va tu API Key
            clientId: 'TU_CLIENT_ID', // Aquí va tu Client ID
            scope: 'https://www.googleapis.com/auth/spreadsheets',
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        }).then(function() {
            console.log("Google API Client Initialized");
        });
    }

    function saveDataToGoogleSheet(data) {
        const params = {
            spreadsheetId: 'TU_ID_DE_HOJA_DE_CALCULO',  // ID de tu hoja de Google Sheets
            range: 'Sheet1!A1',  // El rango de celdas donde quieres ingresar los datos
            valueInputOption: 'RAW',
            resource: {
                values: [
                    [data.descripcion, data.cantidad, data.precio]
                ]
            }
        };
        gapi.client.sheets.spreadsheets.values.append(params).then(function(response) {
            console.log("Datos guardados en Google Sheets", response);
        });
    }

    document.getElementById('cotizadorForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const descripcion = document.getElementById('descripcion').value;
        const cantidad = document.getElementById('cantidad').value;
        const precio = document.getElementById('precio').value;

        const data = {
            descripcion: descripcion,
            cantidad: cantidad,
            precio: precio
        };

        saveDataToGoogleSheet(data); // Guardar los datos en Google Sheets
    });

    gapi.load('client:auth2', initClient);
</script>

</body>
</html>
