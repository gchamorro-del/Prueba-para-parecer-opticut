<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCutter - Optimización de Corte</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            margin: 20px 0;
        }
        label, input, button {
            margin: 5px 0;
            padding: 10px;
        }
        button {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        .output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            background-color: #f4f4f4;
        }
        .material-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>OptiCutter - Optimización de Corte de Materiales</h1>

<div class="container">
    <label for="length">Longitud de pieza:</label>
    <input type="number" id="length" placeholder="Longitud de la pieza a cortar" min="1">
    <label for="quantity">Cantidad de piezas:</label>
    <input type="number" id="quantity" placeholder="Cantidad de piezas" min="1">
    <button onclick="calculateCut()">Calcular Corte</button>
</div>

<div class="material-container">
    <label for="materialStock">Tiras de material disponible (longitudes separadas por coma):</label>
    <input type="text" id="materialStock" placeholder="Ejemplo: 500, 800, 1000">
</div>

<div class="output" id="result"></div>

<script>
    // Algoritmo Best-Fit
    function bestFit(items, binCapacity) {
        let bins = [];
        
        items.forEach(item => {
            let bestBinIndex = -1;
            let minSpaceLeft = binCapacity + 1;

            // Buscar el contenedor que mejor se ajusta
            for (let i = 0; i < bins.length; i++) {
                let spaceLeft = binCapacity - bins[i];
                if (spaceLeft >= item && spaceLeft < minSpaceLeft) {
                    minSpaceLeft = spaceLeft;
                    bestBinIndex = i;
                }
            }

            // Si se encuentra el mejor contenedor
            if (bestBinIndex !== -1) {
                bins[bestBinIndex] += item;
            } else {
                bins.push(item);  // Crear un nuevo contenedor
            }
        });

        return bins.length;  // Devolver el número de contenedores necesarios
    }

    // Función para manejar la entrada del usuario
    function calculateCut() {
        const length = parseFloat(document.getElementById('length').value);
        const quantity = parseInt(document.getElementById('quantity').value);
        const materialStock = document.getElementById('materialStock').value.split(',').map(Number);

        if (!length || !quantity || length <= 0 || quantity <= 0) {
            alert("Por favor ingresa valores válidos para longitud y cantidad.");
            return;
        }

        // Verificar si las tiras de material están disponibles
        if (materialStock.length === 0 || materialStock.some(val => isNaN(val) || val <= 0)) {
            alert("Por favor ingresa las tiras de material válidas.");
            return;
        }

        // Generar el arreglo de piezas a cortar
        const items = Array(quantity).fill(length);
        let binsUsed = 0;

        // Contar cuántas tiras de material necesitamos
        materialStock.forEach(binCapacity => {
            const result = bestFit(items, binCapacity);
            binsUsed += result;
        });

        // Mostrar el resultado
        document.getElementById('result').innerHTML = `Se necesitan ${binsUsed} tiras de material para cortar todas las piezas.`;
    }
</script>

</body>
</html>
